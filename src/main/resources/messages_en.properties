# Validation Errors
error.validation = Validation error occurred
error.invalid_field = Provided data is invalid
error.missing_field = Mandatory field is missing
error.out_of_range = Provided data is out of range
error.invalid_format = Invalid data format

# Authentication & Authorization Errors
error.unauthorized = Please log in to continue
error.forbidden = You do not have permission to perform this action

# Request Format Errors
error.invalid_request = Invalid request
error.invalid_json_format = Invalid request format
error.unsupported_media_type = Unsupported media type
